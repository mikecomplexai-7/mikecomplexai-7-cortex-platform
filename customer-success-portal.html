<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Success Portal | Cortex Intelligence Nexus</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .csp-container {
            background: linear-gradient(135deg, #0a1628 0%, #1a3a52 100%);
            color: #e2e8f0;
        }
        .csp-header {
            background: linear-gradient(90deg, #001a36 0%, #003366 100%);
            padding: 24px 40px;
            border-bottom: 2px solid #00d4ff;
        }
        .csp-header h1 {
            color: #00d4ff;
            margin: 0;
            font-size: 24px;
        }
        .csp-content {
            padding: 40px;
        }
        .section-title {
            color: #00d4ff;
            font-size: 20px;
            margin-bottom: 24px;
            font-weight: 600;
        }
        .metric-card {
            background: linear-gradient(135deg, #1a3a52 0%, #0f2940 100%);
            border: 1px solid #00d4ff;
            border-radius: 8px;
            padding: 20px;
            display: inline-block;
            margin-right: 20px;
        }
        .metric-value {
            color: #00d4ff;
            font-size: 28px;
            font-weight: bold;
            margin: 0;
        }
        .btn-primary {
            background: linear-gradient(90deg, #00d4ff, #0084d4);
            color: #0a1628;
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            font-weight: 600;
            cursor: pointer;
        }
        .footer {
            background: #0f2940;
            padding: 24px 40px;
            color: #718096;
            font-size: 12px;
            text-align: center;
        }
    </style>
</head>
<body class="csp-container">
    <header class="csp-header">
        <h1>🚀 Customer Success Portal</h1>
    </header>
    <main class="csp-content">
        <section>
            <h2 class="section-title">Your Account</h2>
            <div class="metric-card">
                <div>API Calls</div>
                <p class="metric-value">12.4K</p>
            </div>
            <div class="metric-card">
                <div>Uptime</div>
                <p class="metric-value">99.97%</p>
            </div>
        </section>
        <section>
            <h2 class="section-title">Quick Start</h2>
            <p>Step 1: Set up your account</p>
            <p>Step 2: Generate API keys</p>
            <p>Step 3: Deploy integration</p>
            <button class="btn-primary">Get Started</button>
        </section>
    </main>
    <footer class="footer">© 2026 CINIS</footer>
</body>
</html>
