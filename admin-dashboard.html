<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Cortex Intelligence Nexus</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .admin-container {
            display: grid;
            grid-template-columns: 250px 1fr;
            min-height: 100vh;
            background: #0a1628;
        }
        .admin-sidebar {
            background: linear-gradient(135deg, #001a36 0%, #003366 100%);
            padding: 24px;
            border-right: 2px solid #00d4ff;
        }
        .admin-sidebar h3 {
            color: #00d4ff;
            margin-bottom: 20px;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .admin-menu {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        .admin-menu li {
            margin-bottom: 12px;
        }
        .admin-menu a {
            color: #a0aec0;
            text-decoration: none;
            font-size: 14px;
            padding: 8px 12px;
            display: block;
            border-radius: 4px;
            transition: all 0.3s ease;
        }
        .admin-menu a:hover,
        .admin-menu a.active {
            background: #00d4ff;
            color: #0a1628;
        }
        .admin-main {
            padding: 40px;
        }
        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            border-bottom: 1px solid #1e3a5f;
            padding-bottom: 20px;
        }
        .admin-header h1 {
            color: #00d4ff;
            margin: 0;
            font-size: 28px;
        }
        .admin-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 24px;
            margin-bottom: 40px;
        }
        .stat-card {
            background: linear-gradient(135deg, #1a3a52 0%, #0f2940 100%);
            border: 1px solid #00d4ff;
            border-radius: 8px;
            padding: 24px;
            color: #e2e8f0;
        }
        .stat-card h3 {
            color: #a0aec0;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin: 0 0 12px 0;
        }
        .stat-card .value {
            color: #00d4ff;
            font-size: 32px;
            font-weight: bold;
            margin: 0;
        }
        .stat-card .change {
            color: #48bb78;
            font-size: 12px;
            margin-top: 8px;
        }
        .admin-section {
            background: linear-gradient(135deg, #1a3a52 0%, #0f2940 100%);
            border: 1px solid #1e3a5f;
            border-radius: 8px;
            padding: 24px;
            margin-bottom: 24px;
        }
        .admin-section h2 {
            color: #00d4ff;
            margin-top: 0;
            margin-bottom: 20px;
            font-size: 18px;
        }
        .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
        }
        .badge-active {
            background: rgba(72, 187, 120, 0.2);
            color: #48bb78;
            border: 1px solid #48bb78;
        }
        .footer-text {
            font-size: 12px;
            color: #718096;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #1e3a5f;
        }
    </style>
</head>
<body>
    <div class="admin-container">
        <aside class="admin-sidebar">
            <h3>Admin Menu</h3>
            <ul class="admin-menu">
                <li><a href="#dashboard" class="active">Dashboard</a></li>
                <li><a href="#users">Users</a></li>
                <li><a href="#compliance">Compliance</a></li>
            </ul>
        </aside>
        <main class="admin-main">
            <div class="admin-header">
                <h1>Admin Dashboard</h1>
            </div>
            <div class="admin-stats">
                <div class="stat-card">
                    <h3>Active Users</h3>
                    <p class="value">1,247</p>
                    <p class="change">↑ 12% this month</p>
                </div>
                <div class="stat-card">
                    <h3>API Calls (24h)</h3>
                    <p class="value">48.3K</p>
                    <p class="change">↑ 5% vs yesterday</p>
                </div>
                <div class="stat-card">
                    <h3>System Health</h3>
                    <p class="value" style="color: #48bb78;">99.98%</p>
                    <p class="change">All systems nominal</p>
                </div>
            </div>
            <div class="footer-text">Cortex Intelligence Nexus • Enterprise Governance Framework</div>
        </main>
    </div>
    <script>
        document.querySelectorAll('.admin-menu a').forEach(link => {
            link.addEventListener('click', function(e) {
                e.preventDefault();
                document.querySelectorAll('.admin-menu a').forEach(l => l.classList.remove('active'));
                this.classList.add('active');
            });
        });
    </script>
</body>
</html>
